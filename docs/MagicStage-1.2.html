<h2>MagicStage 1.2 更新内容</h2>
<h3>新功能</h3>
<ul>
  <li><strong>窗口预览</strong> — 鼠标悬停 Dock 图标时，自动弹出该应用所有窗口的缩略图预览，支持快速关闭窗口</li>
  <li><strong>触控反馈</strong> — 新增四处触控板震动反馈：拖拽分屏、窗口预览弹出、窗口最小化、Dock 快捷退出</li>
</ul>
<h3>修复</h3>
<ul>
  <li>修复窗口预览默认开启状态不生效的问题</li>
  <li>优化更新检查稳定性</li>
</ul>
<p style="color: #888; font-size: 12px;">新功能默认开启，可在「设置」中调整。</p>
